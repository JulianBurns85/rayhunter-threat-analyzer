    mnc: "001"
    carrier: "Telstra AU"
    tac: 12385
    observed_cids: ["137713195", "137713155", "137713175", "137713185"]
    t3_s: 210.182

  - profile_id: "harris_commercial_lte_periodic_vodafone"
    mnc: "003"
    carrier: "Vodafone AU"
    tac: 30336
    observed_cids: ["8409357", "8409367", "8409387", "8409397"]
    t3_s: 210.182
