# ---------------------------------------------------------------------------
# Hard landing indicators (catch-release failure modes)
# ---------------------------------------------------------------------------

hard_landing_indicators:
  description: >
    A "hard landing" occurs when the target device fails to re-attach
    after a RayFish catch-and-release cycle, resulting in visible
    network disruption. Hard landings are avoided in transparent proxy
    mode but may occur during profile switching or timer changes.

  observed_artefacts:
    - ts_approx: "2026-05-08 post-ACMA"
      artefact: "40.096s T3 — Vodafone profile on Telstra carrier"
      interpretation: >
        Profile mismatch during live carousel. Operator corrected rapidly.
        Artefact duration <1 cycle confirms real-time RayFish console access.
