profile_set_id: "harris_catch_release_modes"
name: "Harris RayFish Catch-and-Release Operational Profiles"
version: "1.0"

# ---------------------------------------------------------------------------
# Phase definitions observed in Cranbourne East captures
# ---------------------------------------------------------------------------

phases:

  - phase_id: "phase_1_baseline"
    label: "Phase 1 — Baseline (Long Cycle)"
    observed: "Nov 2024 — ~28 Jan 2026"
    duration_days: ~85
    t3_cycle_s: 3000             # ~50-minute catch-and-release
    t3_sd_s: null                # Not yet analysed in detail
    interpretation: >
      Initial deployment phase. Long T3 timer = infrequent catch cycles.
      Device establishing baseline coverage and periodic IMSI sweeps.
      Consistent with pre-targeting reconnaissance phase.

  - phase_id: "phase_2_intensified"
    label: "Phase 2 — Intensified Targeting (210.2s Metronomic)"
    observed: "~28 Jan 2026 — 7 May 2026"
    duration_days: ~99
    t3_cycle_s: 210.182
    t3_sd_ms: 0.138
    t3_events: 333
    interpretation: >
      Deliberate reconfiguration to 210.2s cycle. Machine-precision SD
      (0.138ms) confirms RayFish Controller automated scheduling.
      Transition from ~3000s to 210.2s represents 14x increase in
      catch frequency — consistent with intensified targeting of a
      specific IMSI (Rayhunter unit's s-TMSI).
      RayFish T3 configuration: catch -> release -> catch at 210.2s intervals.

  - phase_id: "phase_3_post_acma"
    label: "Phase 3 — Post-ACMA Visit (Chaotic T3)"
    observed: "8 May 2026 — present"
    t3_cycles_observed: [84, 979, 1253, 40.096]
    t1_s: 610.6                  # Unchanged — core HailStorm infrastructure
    interpretation: >
      Operator aware of regulatory attention (ACMA field visit 8 May 2026).
      T3 made deliberately chaotic to obscure metronomic signature.
      T1 (610.6s HailStorm signature) unchanged — operator confident
      in core infrastructure security.
      40.096s artefact = Vodafone profile applied briefly to Telstra device
      — operator cycling through RayFish saved carrier profiles live.

# ---------------------------------------------------------------------------
# T3 phase transition matrix
# ---------------------------------------------------------------------------

t3_transitions:
  - from_s: 3000
    to_s: 210.182
    date: "~2026-01-28"
    significance: >
      14x increase in catch frequency. Indicates new operational directive
      or updated target profile loaded into RayFish Controller.

  - from_s: 210.182
    to_s: "chaotic (84/979/1253/40)"
    date: "2026-05-08"
    significance: >
      Immediate response to ACMA field visit. Operator has intelligence
      access — received advance notice of regulatory action.

