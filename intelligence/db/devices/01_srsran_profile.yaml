# =============================================================================
# Device Profile: srsRAN / OpenAirInterface
# =============================================================================
# File: intelligence/db/devices/01_srsran_profile.yaml
#
# srsRAN is an open-source 4G/5G software radio suite.
# In IMSI catcher deployments it typically runs on a laptop + USRP/HackRF/LimeSDR.
# Default configuration produces highly recognisable timing signatures.
#
# Sources:
#   srsRAN 23.04 documentation (srs.io)
#   Papadopoulos "Security Assessment of GSM Um Interface" Piraeus MSc 2021
#   Sumailov "Rogue Mobile Phone Base Station" Univ. Tartu BSc 2023
#   Ziayi et al. YAICD 2021
# =============================================================================

device_id: "srsran_automated"
name: "srsRAN / OpenAirInterface LTE"
vendor: "Software Radio Systems (SRS) / OAI Forum"
type: "open_source_lte_stack"
cost_range_usd: [500, 3000]   # SDR hardware + laptop
access_tier: "Public (open source)"

capabilities:
  lte_support: true
  gsm_support: true
  multi_carrier: false          # Single eNB per instance
  transparent_proxy: false      # Requires additional tooling
  direction_finding: false
  silent_intercept: false

timing_signatures:
  rrc_release_cycle_s: 210.2   # Default RRCConnectionRelease timer
  rrc_sd_typical_ms: 500       # Variable — load dependent
  note: >
    210.2s is the srsRAN 23.04 default T310 / RRC inactivity timer.
    Legitimate LTE networks use dynamic values (1800-3600s typical).
    Presence of this cycle alone does not confirm srsRAN — must
    cross-reference with EEA0 presence (srsRAN MitM always produces EEA0).

discriminators:
  confirms:
    - eea0_present              # Always in MitM mode
    - metronomic_210s           # Default timer value
    - forced_2g_downgrade       # Common attack vector
    - single_carrier_only
  excludes:
    - zero_eea0                 # Contradicts srsRAN MitM mode
    - cross_carrier_simultaneous
    - metronomic_610s           # Harris T1 — not in srsRAN
    - persistence_300_days      # Impractical for open-source setup

detection_notes: >
  Sumailov (2023, Univ. Tartu) demonstrated that srsRAN-based rogue BTS
  cannot silently capture modern 4G smartphones without forcing them to
  2G (which produces observable jamming artefacts) or negotiating EEA0
  null-cipher (which is detectable). Both leave forensic traces.
  Absence of both = transparent proxy mode = not srsRAN.
