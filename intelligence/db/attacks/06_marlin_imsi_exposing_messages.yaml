# Marlin IMSI-Exposing Message Taxonomy
# Source: Tucker et al., "Detecting IMSI-Catchers by Characterizing Identity
#         Exposing Messages in Cellular Traffic", NDSS 2025
#         DOI: 10.14722/ndss.2025.241115
#
# The Marlin methodology identifies 53 pre-authentication messages across
# 2G/3G/4G/5G-NSA that can force IMSI exposure. Unlike heuristic detection
# that looks for correlated behaviors, this focuses on CAUSAL messages that
# an IMSI catcher MUST use.
#
# Usage: Load into rayhunter-threat-analyzer intelligence/db/attacks/
# Placement: intelligence/db/attacks/06_marlin_imsi_exposing_messages.yaml

meta:
  name: "Marlin IMSI-Exposing Message Taxonomy"
  version: 1.0
  date: "2026-05-22"
  source: "Tucker et al., NDSS 2025"
  doi: "10.14722/ndss.2025.241115"
  description: >
    Comprehensive catalog of 53 messages an IMSI catcher can use to force
    mobile devices to reveal their permanent identifiers. Organized by
    cellular generation and message flow category. Each message is weighted
    by diagnostic value (how strongly it indicates IMSI catcher activity
    vs legitimate network behavior).

# Baseline: In normal operations, IMSI-exposing connections represent
# less than 3% of total LTE connections (Marlin measurement study,
# 400+ hours across two continents).
baseline:
  normal_exposure_ratio: 0.03  # 3% of connections
  significance_threshold: 0.005  # p-value for detection

# ============================================================
# LTE (4G) IMSI-Exposing Messages
# ============================================================
lte_messages:
  # --- Direct Identity Request ---
  - id: LTE-01
    name: "Identity Request (IMSI)"
    nas_type: "Identity Request"
    identity_type: 1  # IMSI
    spec: "3GPP TS 24.301 §5.4.4"
    weight: 1.0  # Strongest indicator
    description: "Direct request for IMSI — primary IMSI catcher mechanism"
    rayhunter_detectable: true
    
  - id: LTE-02
    name: "Identity Request (IMEI)"
    nas_type: "Identity Request"
    identity_type: 2  # IMEI
    spec: "3GPP TS 24.301 §5.4.4"
    weight: 0.7
    description: "Request for device IMEI — device tracking"
    rayhunter_detectable: true
    
  - id: LTE-03
    name: "Identity Request (IMEISV)"
    nas_type: "Identity Request"
    identity_type: 3  # IMEISV
    spec: "3GPP TS 24.301 §5.4.4"
    weight: 0.8
    description: "Request for IMEI + software version — device fingerprinting"
    rayhunter_detectable: true

  # --- Authentication Failures Forcing Re-identification ---
  - id: LTE-04
    name: "Authentication Reject"
    nas_type: "Authentication Reject"
    spec: "3GPP TS 24.301 §5.4.3.2"
    weight: 0.9
    description: >
      Reject authentication to force UE to re-attach with IMSI.
      FlashCatch Phase 2 uses this to trigger cell barring.
    rayhunter_detectable: true
    
  - id: LTE-05
    name: "Attach Reject (cause #2 IMSI unknown)"
    nas_type: "Attach Reject"
    cause: 2
    spec: "3GPP TS 24.301 §5.5.1.3.4"
    weight: 0.8
    description: "Reject attach claiming IMSI unknown — forces re-identification"
    rayhunter_detectable: true
    
  - id: LTE-06
    name: "Attach Reject (cause #3 illegal UE)"
    nas_type: "Attach Reject"
    cause: 3
    spec: "3GPP TS 24.301 §5.5.1.3.4"
    weight: 0.6
    description: "Can force UE to attempt emergency attach with IMSI"
    rayhunter_detectable: true

  - id: LTE-07
    name: "TAU Reject (cause #9 not allowed)"
    nas_type: "Tracking Area Update Reject"
    cause: 9
    spec: "3GPP TS 24.301 §5.5.3.3.4"
    weight: 0.7
    description: "Reject TAU to force fresh attach with IMSI"
    rayhunter_detectable: true

  - id: LTE-08
    name: "TAU Reject (cause #10 implicitly detached)"
    nas_type: "Tracking Area Update Reject"
    cause: 10
    spec: "3GPP TS 24.301 §5.5.3.3.4"
    weight: 0.7
    description: "Claims UE is detached, forcing re-attach with IMSI"
    rayhunter_detectable: true

  - id: LTE-09
    name: "Service Reject (cause #9)"
    nas_type: "Service Reject"
    cause: 9
    spec: "3GPP TS 24.301 §5.6.1.5"
    weight: 0.6
    description: "Reject service request to force re-identification"
    rayhunter_detectable: true

  - id: LTE-10
    name: "Service Reject (cause #10)"
    nas_type: "Service Reject"
    cause: 10
    spec: "3GPP TS 24.301 §5.6.1.5"
    weight: 0.6
    description: "Reject service claiming detachment"
    rayhunter_detectable: true

  # --- Security Mode Anomalies ---
  - id: LTE-11
    name: "Security Mode Command (EEA0 null cipher)"
    nas_type: "Security Mode Command"
    cipher: "EEA0"
    spec: "3GPP TS 33.401 §8.2"
    weight: 0.9
    description: "Null cipher — all communications in plaintext"
    rayhunter_detectable: true
    
  - id: LTE-12
    name: "Security Mode Command without prior Authentication"
    nas_type: "Security Mode Command"
    spec: "3GPP TS 33.401 §6.1"
    weight: 0.7
    description: >
      SMC issued without preceding Authentication Request/Response.
      May indicate MitM proxy or cached context exploitation.
    rayhunter_detectable: true

  # --- Paging-based IMSI Exposure ---
  - id: LTE-13
    name: "Paging with IMSI (instead of S-TMSI)"
    nas_type: "Paging"
    id_type: "IMSI"
    spec: "3GPP TS 36.331 §5.3.2"
    weight: 0.9
    description: >
      Legitimate networks page with S-TMSI (temporary ID).
      Paging with IMSI forces the UE to respond with its permanent ID.
    rayhunter_detectable: false  # Requires RRC-level paging decode

  # --- RRC-level Pre-authentication Messages ---
  - id: LTE-14
    name: "RRC Connection Release (cause=other)"
    rrc_type: "RRCConnectionRelease"
    cause: "other"
    spec: "3GPP TS 36.331 §5.3.8"
    weight: 0.3  # Low individual weight — high weight when metronomic
    description: >
      Connection release with generic cause. Single instance is normal.
      Metronomic repetition is catch-and-release signature.
    rayhunter_detectable: true
    
  - id: LTE-15
    name: "RRC Connection Release with redirectedCarrierInfo (2G)"
    rrc_type: "RRCConnectionRelease"
    spec: "3GPP TS 36.331 §5.3.8.3"
    weight: 0.9
    description: "Forces UE to 2G where IMSI is exposed in plaintext"
    rayhunter_detectable: true

  # --- System Information Anomalies ---
  - id: LTE-16
    name: "SIB6/SIB7 with 2G/3G high-priority frequencies"
    sib_type: "SIB6/SIB7"
    spec: "3GPP TS 36.331 §6.3.1"
    weight: 0.8
    description: "Broadcast encouraging 2G/3G reselection — downgrade vector"
    rayhunter_detectable: true

  - id: LTE-17
    name: "SIB1 with empty/minimal intraFreqNeighCellList"
    sib_type: "SIB4"
    spec: "3GPP TS 36.331 §6.3.1"
    weight: 0.5
    description: >
      Empty neighbor cell list — rogue cell doesn't know its neighborhood.
      Partial indicator per YAICD heuristic 4.1.7.
    rayhunter_detectable: true

  # --- Measurement-based Tracking ---
  - id: LTE-18
    name: "Forced high-frequency MeasurementReport (reportInterval < 10s)"
    rrc_type: "MeasConfig"
    spec: "3GPP TS 36.331 §5.5.5"
    weight: 0.7
    description: >
      reportInterval=ms5120 (5.12s) is tracking-grade configuration.
      Normal cells use 120-240s intervals.
    rayhunter_detectable: true  # Via MeasurementReport timing analysis

  - id: LTE-19
    name: "UEInformationRequest (excessive)"
    rrc_type: "UEInformationRequest-r9"
    spec: "3GPP TS 36.331 §5.6.5"
    weight: 0.5
    description: >
      Network requesting device information. Anomalous when >90% of
      connections include this request.
    rayhunter_detectable: true


# ============================================================
# Detection Methodology (Marlin)
# ============================================================
detection_methodology:
  approach: "Ratio-based statistical detection"
  description: >
    Count IMSI-exposing connections (any connection containing one or more
    of the above messages) vs total connections. Compare the ratio against
    the baseline measurement (median < 3% for LTE). Compute binomial 
    p-value for statistical significance.
  
  formula: >
    exposure_ratio = imsi_exposing_connections / total_connections
    p_value = binomial_test(imsi_exposing_connections, total_connections,
                            baseline_ratio, alternative='greater')
  
  thresholds:
    significant: 0.005  # p < 0.005
    strong: 0.001       # p < 0.001
    overwhelming: 0.0001  # p < 0.0001
  
  validation: >
    Marlin detected IMSI catcher presence at a high-profile public event
    with p << 0.005, representing the first published detection with
    statistical significance.


# ============================================================
# Known Attack Profiles
# ============================================================
attack_profiles:
  - name: "Harris HailStorm / StingRay II (MitM Proxy)"
    messages_used: [LTE-01, LTE-02, LTE-03, LTE-12, LTE-14, LTE-18, LTE-19]
    cipher: "EEA2"  # Proxies real authentication, uses strong cipher
    timer_signatures:
      - period_s: 210.2
        type: "RRCConnectionRelease"
        sd_s: 1.2
    characteristics:
      - "Multi-carrier simultaneous operation"
      - "Strong cipher (EEA2/EIA2) — MitM proxy to real network"
      - "Forced 5.12s MeasurementReport interval"
      - "Zero or near-zero GUTI reallocation"
    danger_score: 9

  - name: "FlashCatch (Sub-second IMSI Capture)"
    messages_used: [LTE-01, LTE-04, LTE-05]
    timer_signatures:
      - period_s: null  # No timer — single-shot
        type: "sub-second CID flash"
    characteristics:
      - "CID appears for < 2 seconds"
      - "Authentication failure triggers cell barring"
      - "UE never reconnects to rogue CID"
      - "Preserves GUTI for subsequent linkability"
    danger_score: 8
    reference: "Paci et al., WiSec 2025"

  - name: "Naive IMSI Grabber (srsRAN/OpenBTS)"
    messages_used: [LTE-01, LTE-11, LTE-15]
    cipher: "EEA0"  # Null cipher — cannot proxy authentication
    timer_signatures: []
    characteristics:
      - "Null cipher (EEA0)"
      - "May force 2G downgrade"
      - "Single carrier operation"
      - "Low persistence (minutes, not hours)"
    danger_score: 5
