confirmed_defaults:
  rrc_inactivity_timer_ms: 30000
  rrc_inactivity_timer_seconds: 30.0
  notes: >
    Confirmed from srsRAN_4G source code:
    ("expert.rrc_inactivity_timer", default_value(30000), "Inactivity timer in ms.")
    This is the timer that drives the metronomic RRCConnectionRelease cycle.

  cipher_preference_eea: ["EEA0", "EEA2", "EEA1"]
  cipher_preference_eia: ["EIA2", "EIA1", "EIA0"]
  cipher_notes: >
    Confirmed from srsRAN_4G source code:
    eea_pref_list default: "EEA0, EEA2, EEA1"
    eia_pref_list default: "EIA2, EIA1, EIA0"
    EEA0 (no encryption) is the FIRST preference. Without explicit
    cipher enforcement at MME/EPC level, srsRAN will negotiate
    EEA0 by default. This is why open-source IMSI catchers using
    srsRAN produce null-cipher (EEA0) Security Mode Commands.

  max_mac_dl_kos: 100
  max_mac_ul_kos: 100

cranbourne_east_correlation:
  observed_interval_seconds: 210.212
  observed_sd_seconds: 0.139
  sample_count: 333
  sessions: 13
  analysis: >
    The observed 210.2s metronomic RRCConnectionRelease cycle is NOT
    the srsRAN default inactivity timer (30s). The 210.2s value is
    consistent with Harris RayFish Controller T3 parameter setting.

    srsRAN default (30s) would produce ~30s cycles.
    Harris T3 (210.2s) produces exactly the observed cycle.

    This is a key discriminator: the 210.2s cycle CANNOT be srsRAN
    default behavior. It IS consistent with Harris commercial hardware.

    Cross-carrier simultaneous release additionally rules out srsRAN
    entirely — srsRAN cannot synchronize release across two independent
    carrier networks simultaneously.

  conclusion: >
    The Cranbourne East metronomic signature (210.2s) with cross-carrier
    simultaneous release is inconsistent with srsRAN/OAI and is consistent
    ONLY with Harris commercial IMSI catcher hardware (HailStorm/StingRay II).

