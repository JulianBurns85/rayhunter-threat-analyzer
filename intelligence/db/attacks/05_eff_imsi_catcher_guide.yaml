license: "CC BY 4.0"
citation_safe: true
url: "https://www.eff.org/pages/crocodile-hunter"

# ── ATTACK TAXONOMY ───────────────────────────────────────────────────────────
attack_taxonomy:

  basic_imsi_catcher:
    mechanism: >
      CSS positions itself closer to target than legitimate tower, or transmits
      at higher power. UE connects due to stronger signal. CSS forces IMSI disclosure.
      Most basic mode: IMSI harvest only, no intercept.
    detection_indicators:
      - "Higher-than-expected signal strength from unrecognised cell"
      - "Unexpected Location Update triggered without mobility"
      - "Identity Request following fresh attach"

  communication_interception:
    spoofing_authentication:
      description: >
        CSS impersonates network to UE AND impersonates UE to network (MitM).
        Requires real-time proxying of authentication challenge/response.
      complexity: HIGH
      detection: "Auth response round-trip timing anomaly"

    null_cipher_downgrade:
      description: >
        CSS negotiates null cipher (A5/0 for GSM, EEA0 for LTE) so communications
        are transmitted in plaintext. UE is not notified that encryption is disabled.
        No standard user-facing indicator — UE simply accepts cipher negotiation.
      eff_note: >
        "Why aren't users alerted? Standards do not require UE to notify user
        of cipher choice." (EFF Guide Section 3.2.3)
      detection:
        - "Security Mode Command with EEA0+EIA0 (null cipher)"
        - "NAS Security Mode Command with null cipher requested"
      cranbourne_east_note: >
        All SecurityModeCommands in the Cranbourne East M7350 dual-unit
        capture era (January 2026 onwards) use EEA2/EIA2 (AES-128).
        Zero EEA0 events confirmed via tshark across all directly verified
        files. Harris Transparent Proxy mode maintains legitimate-appearing
        encryption while proxying traffic — this is why standard null-cipher
        detection produces zero alerts on this device.
      lte_note: >
        In LTE, EEA0 (no encryption) + EIA0 (no integrity) = complete null cipher.
        Both must be present for full plaintext interception.

    service_downgrade:
      description: >
        CSS forces UE from LTE/4G to 2G/GSM where encryption is weaker or absent.
        GSM A5/1 cipher is cryptographically broken. A5/0 = no encryption.
        Downgrade achieved by sending RRCConnectionRelease with redirect to GSM.
      detection:
        - "RRCConnectionRelease with frequencyInfoUTRA or geranTargetFreqInfo"
        - "EARFCN reassignment to GSM/UMTS frequency"
        - "Cipher negotiation downgrade after protocol switch"
      cranbourne_east_note: >
        Zero 2G downgrade redirects confirmed across all Cranbourne East
        captures. Consistent with Harris Transparent Proxy mode which
        operates entirely within LTE.

  lte_css_connection_techniques:
    description: >
      LTE IMSI-Catchers use the same mechanism as GSM — force UE to attach
      by broadcasting stronger signal or on priority frequency list channels.
      Key difference: LTE has mutual authentication — CSS cannot fully authenticate
      unless it proxies the real network (MitM). Without MitM, CSS rejects UE
      after IMSI capture (Catch and Release).
    catch_and_release_eff_description: >
      CSS captures IMSI during attach, then rejects UE so it falls back to
      legitimate tower. UE experiences brief service interruption.
    harris_transparent_proxy_note: >
      Harris Transparent Proxy mode extends the basic Catch and Release
      mechanism by maintaining a live MitM proxy to the real network,
      providing the UE with legitimate connectivity while intercepting
      traffic. This mode produces zero native Rayhunter alerts (no null
      cipher, no 2G redirect, no Identity Request) and is only detectable
      via timing analysis, Cell ID anomalies, and UEInformationRequest-r9
      harvesting patterns.

  location_tracking:
    presence_testing_lte:
      description: >
        CSS pages specific TMSI. If UE responds, target is in area.
        Does not require IMSI — works with previously captured TMSI.
      detection: "Targeted paging of known TMSI without subsequent call/SMS"

    active_location_direction_finding:
      description: >
        Once IMSI known, CSS forces UE to transmit at maximum power (MS DF mode).
        Directional antenna (AmberJack/Arrowhead) triangulates location.
        Sub-meter accuracy achievable with 3-antenna array.
      eff_source: "Cited in Florida v. Thomas suppression hearing"
      detection: "Sustained high RSSI from target device; battery drain artifact"

  denial_of_service:
    protocol_downgrade:
      description: >
        Jam LTE frequencies — forces UE to fall back to 2G. This degrades
        security before CSS engages on the weaker protocol.
      detection: "Sudden LTE signal loss with simultaneous GSM activity spike"

    paging_flood:
      description: >
        Send invalid paging data to force UE out of CSS cell.
        Used to force specific UE to re-register (reveals TMSI).
      yaicd_parameter: "P6 — large number of paging groups"
      detection: "Anomalous paging rate"

# ── DETECTION METHODS DOCUMENTED BY EFF ──────────────────────────────────────
detection_methods:
  weak_cipher_detection:
    description: "Flag Security Mode Commands with A5/0 or EEA0"
    limitation: >
      Legitimate networks occasionally use weak ciphers in some regions.
      Harris Transparent Proxy mode avoids EEA0 entirely — this detector
      produces zero alerts against that operational mode. Do not interpret
      zero alerts as absence of surveillance.
    rayhunter_coverage: true

  anomalous_bcch_parameters:
    description: "T3212 timer, MSTXPWR outliers from SeaGlass"
    limitation: "Adaptive adversaries can mimic normal BCCH parameters"

  ephemeral_base_station_detection:
    description: "Cell appears briefly then disappears"
    limitation: "Tower on wheels, moving CSS defeats this"

  rrc_periodicity_detection:
    description: >
      Metronomic RRCConnectionRelease cycle with machine-precision timing.
      Legitimate network releases are aperiodic (StdDev >30s).
      IMSI catcher Periodic Registration mode produces sub-second StdDev.
    thresholds:
      high: "StdDev <2.0s across 10+ events"
      critical: "StdDev <0.5s across 10+ events"
    cranbourne_east_phase2_telstra: "210.212s ±0.139s — CRITICAL (tshark verified)"
    cranbourne_east_phase2_vodafone: "40.553s ±0.327s — CRITICAL (tshark verified)"
    rayhunter_coverage: true
    source: "RRCPeriodicityDetector — Rayhunter Threat Analyzer"

  t1_hold_timer_detection:
    description: >
      Machine-precision active connection hold duration (T1). Legitimate
      network hold times are variable and traffic-driven. Harris device
      T1 is operator-configured and produces consistent hold durations.
    cranbourne_east_confirmed: "610.6s ±0.55s across 5 events, both carriers"
    significance: "Consistent T1 across carriers = shared RayFish Controller config"
    rayhunter_coverage: false
    note: "Currently detected via PCAPNG burst analysis — not yet automated in tool"

  imsi_catcher_catcher_apps:
    snoopsnitch: "Monitors Identity Request + LAU Reject (root required)"
    aimsicd: "Android-only, root required, no Identity Request monitoring"
    crocodile_hunter: "SDR-based, EFF project, monitors for rogue towers"
    rayhunter: "EFF project — the hardware platform used in Cranbourne East investigation"

  eff_conclusion: >
    No single detection method is reliable against a sophisticated, adaptive adversary.
    Multi-vector correlation (timing + cipher + identity request + cell persistence)
    produces the lowest false-positive rate. Harris Transparent Proxy mode defeats
    cipher and identity request detectors entirely — timing analysis and Cell ID
    anomaly detection become the primary reliable vectors.

# ── KEY FORENSIC CITATIONS ────────────────────────────────────────────────────
forensic_citations:
  forced_power_transmission:
    source: "Florida v. Thomas suppression hearing"
    text: >
      Officer testified CSS "forces that handset to transmit at full power"
      during direction-finding operation.
    implication: "Battery drain during capture cycles = corroborating physical artifact"

  no_user_notification_of_cipher:
    source: "EFF Guide Section 3.2.3"
    text: >
      Cellular standards do not require UE to alert user when encryption is disabled.
      User has no way to know their calls/data are in plaintext.
    implication: >
      Harris Transparent Proxy mode intercepts traffic without any user-visible
      indicator. The absence of EEA0 in captures does not mean traffic is
      secure — Transparent Proxy re-encrypts at the proxy layer.

  cost_barrier_removal:
    source: "EFF Guide Introduction"
    note: >
      Commercial IMSI-Catchers originally cost $68,000–$134,000 (StingRay range).
      SDR-based implementations now deployable for ~$1,500.
      This democratizes both attack AND detection capabilities.

# ── DATA INTEGRITY NOTE ───────────────────────────────────────────────────────
data_integrity:
  policy: >
    Investigation-specific statistics (event counts, violation counts, exposure
    ratios) are NOT hardcoded in this reference file. All such figures must be
    derived from tshark-verified raw binary analysis and documented in
    investigation-specific entries (05_catch_release_hard_landing.yaml).
    Tool output figures (v1.1, v2.0 detector outputs) require tshark
    verification before inclusion in any YAML or submission document.
  removed_figures:
    - figure: "55,232 null-cipher violations"
      reason: >
        Tool v1.1 output — not tshark-verified. Contradicts tshark-confirmed
        zero EEA0 finding from April 11, 2026 direct binary analysis.
        Removed session 9, 9 May 2026.

