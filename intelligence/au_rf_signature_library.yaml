# =============================================================================
# Australian RF Signature Library — v0.1
# CASTNET / Rayhunter Threat Analyzer
# Purpose: Whitelist legitimate authorised RF operators to reduce false positives
#          and protect authorised law enforcement operations from misidentification
# Author: Julian Burns — Cranbourne East VIC 2026
# License: MIT
# Sources: ACMA RRL, Wikipedia Gov Radio Networks AU, RadioReference.com,
#          3GPP TS 36.101, EFF SLS, NEMA PSMB Review, DTF Victoria
# Last updated: 2026-06-07
#
# VERDICT VALUES:
#   AUTHORISED   — known legitimate operator, whitelisted
#   WATCHLIST    — known operator but unusual parameters warrant logging
#   ROGUE        — confirmed or strongly suspected IMSI catcher
#   UNKNOWN      — not in database, flag for manual review
#
# NOTE: This library covers NON-CELLULAR radio systems (P25, TETRA, VHF/UHF)
#       which will NOT appear in LTE-based CASTNET captures.
#       For CASTNET purposes, the key is the CELLULAR LTE section below.
#       If a rogue LTE cell appears that matches known VicPol/AFP operational
#       parameters, escalate to WATCHLIST not ROGUE pending verification.
# =============================================================================

metadata:
  version: "0.1"
  region: "Victoria, Australia"
  mcc: "505"
  maintainer: "Julian Burns"
  github: "https://github.com/JulianBurns85/rayhunter-threat-analyzer"
  last_updated: "2026-06-07"
  triple_confirmation_required: true

