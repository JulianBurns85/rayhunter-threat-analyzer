# hardware_id_library.yaml
# Complete IMSI Catcher Hardware Identification Library
# rayhunter-threat-analyzer v3.6
#
# Sources:
#   - EFF Street Level Surveillance project
#   - The Intercept leaked government catalogue
#   - Academic literature (Dabrowski, Tucker, Zhuang, Ali)
#   - Public patent filings
#   - Manufacturer product pages (where public)
#   - FCC equipment authorisation database
#
# Each entry includes observable RF signatures that can be
# detected from passive monitoring without bladeRF IQ capture.
# bladeRF signatures require IQ data (marked with [IQ_REQUIRED]).

---

professional_tier_1:
  # The gold standard -- government and military grade
  # These are what legitimate law enforcement uses under warrant

  harris_hailstorm_ii:
    manufacturer: "L3Harris Technologies (formerly Harris Corporation)"
    country: "USA"
    product_line: "StingRay family"
    models:
      - "HailStorm II"
      - "HailStorm I"
      - "StingRay II"
      - "StingRay I"
      - "KingFish"
      - "ArrowFish"
      - "AmberJack"
    capabilities:
      standards: ["GSM", "CDMA", "UMTS", "LTE"]
      bands: [1, 2, 3, 4, 5, 7, 8, 12, 13, 17, 25, 26, 28, 41]
      simultaneous_bands: true
      rf_chains: 4
      max_power_dbm: 33
      modes:
        - "IMSI capture"
        - "IMEI capture"
        - "IMEISV capture"
        - "Location tracking"
        - "Active interception"
        - "SMS intercept"
        - "Voice intercept"
        - "Data intercept"
        - "ProSe proximity tracking"
    rf_signatures:
      oscillator: "OCXO"
      frequency_accuracy_ppm: 0.01
      drift_ppm_per_hour: 0.001
      beacon_interval_ms: [80, 160]
      beacon_jitter_ms: 0.5
      phase_noise_dbc_hz_at_10khz: -150
      rsrp_variance_typical: 4.0
      power_ramp_pattern: "smooth_3gpp_compliant"
      sib1_period_ms: 80
      handover_pattern: "3gpp_compliant"
    detection_indicators:
      - "Auth Reject followed immediately by Identity Request"
      - "Zero EEA0 cipher (transparent proxy mode)"
      - "IMEISV request without prior authentication"
      - "ProSe direct discovery advertisements"
      - "Measurement report interval exactly 80ms or 160ms"
      - "No forced 2G downgrade (LTE transparent proxy)"
      - "TA highly consistent (OCXO disciplined)"
    estimated_cost_usd: 400000
    export_controlled: true
    export_authority: "ITAR controlled -- US State Department licence required"
    known_australian_operators:
      - "Australian Federal Police"
      - "ASIO"
      - "ASD (Australian Signals Directorate)"
      - "State police forces (by AFP arrangement)"
    notes: >
      Harris equipment requires a lawful interception warrant in Australia.
      AFP FOI response confirming nil documents means no active Harris
      deployment against the subject under any authorised operation.
      Any Harris-signature detections are therefore UNLAWFUL.

  harris_drt_series:
    manufacturer: "L3Harris Technologies"
    models:
      - "DRT 1101B"
      - "DRT 1301"
      - "DRTbox"
    capabilities:
      standards: ["GSM", "CDMA", "LTE"]
      bands: [1, 3, 7, 28]
      simultaneous_bands: false
      rf_chains: 1
      max_power_dbm: 27
    rf_signatures:
      oscillator: "TCXO"
      frequency_accuracy_ppm: 0.5
      beacon_interval_ms: [160]
      beacon_jitter_ms: 2.0
      phase_noise_dbc_hz_at_10khz: -140
    notes: "Vehicle-mounted variant. Less capable than HailStorm."

  septier_guardian:
    manufacturer: "Septier Communication Ltd"
    country: "Israel"
    models:
      - "Septier GUARDIAN"
      - "Septier CATCHER"
      - "Septier IMSIme"
    capabilities:
      standards: ["GSM", "UMTS", "LTE", "5G-NSA"]
      bands: [1, 3, 7, 8, 20, 28, 38, 40, 41]
      simultaneous_bands: true
      rf_chains: 3
      max_power_dbm: 30
      modes:
        - "IMSI/IMEI capture"
        - "6-identifier harvest (IMSI, IMEI, IMEISV, TMSI, MSISDN, ICCID)"
        - "Facial recognition cross-reference"
        - "Licence plate cross-reference"
        - "Passport cross-reference"
        - "Real-time decryption"
    rf_signatures:
      oscillator: "OCXO"
      frequency_accuracy_ppm: 0.01
      beacon_interval_ms: [80, 160]
      beacon_jitter_ms: 1.0
      sib_pattern: "3gpp_compliant"
    detection_indicators:
      - "6-identifier harvest in single session"
      - "Multi-band simultaneous operation"
      - "Very low beacon jitter"
    estimated_cost_usd: 300000
    export_controlled: true

  rohde_schwarz_ga090:
    manufacturer: "Rohde & Schwarz GmbH & Co KG"
    country: "Germany"
    models:
      - "GA090"
      - "WEST"
      - "R&S EMSB"
    capabilities:
      standards: ["GSM", "UMTS", "LTE", "5G"]
      simultaneous_bands: true
