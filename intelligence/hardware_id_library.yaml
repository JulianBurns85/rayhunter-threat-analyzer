consumer_sdr_platforms:
  # Assembled from commercial SDR hardware + open source software
  # These are what a technically sophisticated individual could build

  srslte_bladerf:
    platform: "srsRAN eNB + BladeRF 2.0 micro xA4"
    software: "srsRAN (formerly srsLTE)"
    hardware: "BladeRF 2.0 micro xA4 with BT-200 LNA"
    country: "Open source (Amarisoft/academic origin)"
    capabilities:
      standards: ["LTE"]
      bands: [1, 3, 7, 28]
      simultaneous_bands: false
      max_power_dbm: 10
      modes:
        - "IMSI capture (via auth reject)"
        - "IMEI/IMEISV capture"
        - "Location tracking"
        - "Limited interception"
    rf_signatures:
      oscillator: "VCTCXO"
      hardware_oscillator: "BladeRF VCTCXO 38.4MHz reference"
      frequency_accuracy_ppm: 1.0
      drift_ppm_per_hour: 0.5
      beacon_interval_ms: [2000, 2100]
      beacon_jitter_ms: 50.0
      measurement_report_period_ms: 2000
      rsrp_variance_typical: 36.0
      phase_noise_dbc_hz_at_10khz: -120
    detection_indicators:
      - "~2.10s inter-event interval (srsRAN measurement_report_period=2000ms)"
      - "High beacon jitter (50ms+) from Linux/Windows scheduling"
      - "Single band per session"
      - "VCTCXO drift visible over hours"
      - "srsRAN default eNB config: standard cell indices"
      - "Auth reject NAS message matches srsRAN template"
    forensic_artifacts:
      - "srsRAN eNB log: /tmp/srsran/enb.log"
      - "srsRAN config: /etc/srsran/enb.conf"
      - "GNU Radio flowgraph files: *.grc"
      - "BladeRF firmware: bladeRF-cli -e version"
    software_config_evidence:
      enb_conf_fields:
        - "enb_id = 537942"
        - "mcc = 505"
        - "mnc = 01"
        - "tac = 12385"
        - "dl_earfcn = [BAND-SPECIFIC]"
    estimated_cost_aud: 800
    technical_skill_required: "HIGH -- RF engineering + Linux sysadmin"
    notes: >
      This is the most likely Device B based on the 2.10s interval
      signature observed in the CASTNET corpus. The operator would
      need the bladeRF hardware (available commercially, ~$600 AUD),
      a laptop running Ubuntu or similar, and srsRAN software (free,
      open source). Configuration requires knowledge of local Telstra
      TAC and eNB allocation -- consistent with telco contractor background.

  srslte_limesdr:
    platform: "srsRAN eNB + LimeSDR"
    hardware: "LimeSDR Mini or LimeSDR USB"
    rf_signatures:
      oscillator: "VCTCXO"
      frequency_accuracy_ppm: 1.0
      beacon_interval_ms: [2000, 2100]
      beacon_jitter_ms: 45.0
    notes: "Functionally similar to BladeRF variant."

  srslte_hackrf:
    platform: "srsRAN eNB + HackRF One"
    hardware: "HackRF One"
    rf_signatures:
      oscillator: "BASIC_XO"
      frequency_accuracy_ppm: 20.0
      beacon_interval_ms: [2000, 2200]
      beacon_jitter_ms: 100.0
    notes: >
      HackRF has poor frequency accuracy and high jitter.
      Would produce very noisy signal. Possible but less likely
      than BladeRF or LimeSDR for sustained operation.

  openlte_platform:
    platform: "OpenLTE + any SDR"
    software: "OpenLTE (open source)"
    rf_signatures:
      beacon_interval_ms: [1000, 1050]
      beacon_jitter_ms: 30.0
    detection_indicators:
      - "~1.024s inter-event interval (OpenLTE default frame-aligned)"
    notes: "Less common than srsRAN. Would show different interval to observed 2.10s."

  osmocombb_platform:
    platform: "OsmocomBB (primarily 2G/GSM)"
    rf_signatures:
      beacon_interval_ms: [480]
    notes: "Primarily GSM. LTE capability limited. Less relevant here."

hardware_matching_rules:
  # Rules for matching observed data to hardware
  # Priority: higher weight rules take precedence

  rule_srslte_confirmed:
    weight: 10
    conditions:
      - "beacon_interval_2000_to_2150ms_fraction > 0.10"
    conclusion: "srsRAN consumer SDR platform CONFIRMED"
    hardware: ["srslte_bladerf", "srslte_limesdr"]
    severity: "CRITICAL"

  rule_professional_hardware:
    weight: 9
    conditions:
      - "beacon_interval_80ms_or_160ms_fraction > 0.50"
      - "beacon_jitter_ms < 5"
    conclusion: "Professional hardware CONFIRMED (Harris/Septier/R&S)"
    hardware: ["harris_hailstorm_ii", "septier_guardian", "rohde_schwarz_ga090"]
    severity: "CRITICAL"

  rule_dual_stack:
    weight: 10
    conditions:
      - "beacon_interval_2000_to_2150ms_fraction > 0.05"
      - "beacon_interval_80ms_or_160ms_fraction > 0.05"
    conclusion: "DUAL HARDWARE STACK -- professional + consumer SDR CONFIRMED"
    hardware: ["harris_hailstorm_ii", "srslte_bladerf"]
    severity: "CRITICAL"
    notes: >
      This is the highest-confidence finding. Presence of BOTH
      professional timing (80/160ms) AND consumer SDR timing (2100ms)
      in the same corpus is physically impossible from a single device.

  rule_band_incompatible_copresence:
    weight: 10
    conditions:
      - "band_28_and_band_3_simultaneous OR band_28_and_band_7_simultaneous"
    conclusion: "Single-chain SDR RULED OUT -- multi-chain or dual device"
    severity: "CRITICAL"

  rule_vctcxo_oscillator:
    weight: 5
    conditions:
      - "rsrp_variance > 25"
      - "drift_coefficient_abs > 0.1"
    conclusion: "VCTCXO oscillator consistent with consumer SDR hardware"
    hardware: ["srslte_bladerf", "srslte_limesdr"]

  rule_ocxo_oscillator:
    weight: 5
    conditions:
      - "rsrp_variance < 9"
      - "drift_coefficient_abs < 0.01"
    conclusion: "OCXO oscillator consistent with professional hardware"
    hardware: ["harris_hailstorm_ii", "septier_guardian"]

forensic_search_guidance:
  # What to look for when executing a search warrant

  computer_artifacts:
    srsran:
      - path: "/etc/srsran/enb.conf"
        look_for: ["enb_id", "tac", "mcc", "mnc", "dl_earfcn"]
      - path: "/tmp/srsran/"
        look_for: ["enb.log", "captured_imsi.csv", "ue_imsi_imei.txt"]
      - path: "~/srsran/"
        look_for: ["enb.conf", "rr.conf", "drb.conf"]
      - path: "C:/srsran/"  # Windows path
        look_for: ["enb.conf"]
    gnu_radio:
      - path: "*.grc"
        look_for: ["bladerf", "srsran", "lte_enb", "537942"]
    bladerf:
      - command: "bladeRF-cli -e version"
        significance: "Confirms bladeRF hardware present"
      - path: "~/.config/bladeRF/"
        look_for: ["calibration", "config"]

  hardware_to_seize:
    primary_targets:
      - "BladeRF 2.0 micro xA4 (blue circuit board, ~10cm x 6cm)"
      - "LimeSDR (green circuit board, ~10cm x 6cm)"
      - "HackRF One (black circuit board with SMA connectors)"
      - "Any SDR dongle with SMA connector (not standard USB dongle shape)"
      - "External power amplifier with SMA connectors"
      - "Directional antenna (LPDA or panel type)"
      - "Laptop or mini PC used for SDR operation"
    secondary_targets:
      - "Any device matching Harris StingRay form factor (briefcase or vehicle unit)"
      - "RF test equipment (spectrum analyser)"
      - "USB-powered RF components"

  specific_config_fingerprint:
    enb_id: 537942
    mcc: 505
    mnc: 1
    tac: 12385
    notes: >
      Finding a configuration file with EXACTLY these values
      is definitive proof of the specific device used in this
      investigation. This configuration is unique -- it matches
      no legitimate Telstra infrastructure and matches all
      CASTNET observations precisely.
