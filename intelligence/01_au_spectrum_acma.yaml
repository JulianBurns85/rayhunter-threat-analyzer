geran_significance:
  note: >
    Australia's 2G (GSM/GERAN) networks were shut down in 2018.
    Any RRCConnectionRelease containing a GERAN redirected carrier
    in Australia is forensically anomalous — there is no legitimate
    2G network to redirect to. This is a strong indicator of a rogue
    eNodeB attempting a 2G downgrade attack.
  references:
    - "3GPP TS 36.331 §5.3.12 — RRC Connection Release with redirect"
    - "3GPP TS 33.401 §C.1 — Security considerations for 2G fallback"

rogue_indicators:
  - description: "EARFCN outside all licensed operator ranges"
    severity: CRITICAL
    confidence: HIGH
  - description: "Cell ID not present in OpenCelliD for this MCC/MNC/TAC"
    severity: CRITICAL
    confidence: MEDIUM
  - description: "GERAN redirect in RRCConnectionRelease (2G shutdown since 2018)"
    severity: CRITICAL
    confidence: HIGH
  - description: "Same Cell ID observed on multiple EARFCNs"
    severity: CRITICAL
    confidence: HIGH
    notes: "Legitimate LTE cell operates on exactly one EARFCN"
  - description: "TAC not matching operator known deployment geography"
    severity: MEDIUM
    confidence: MEDIUM
