# Australian Spectrum Intelligence — ACMA Licensed Bands
# Source: ACMA spectrum licensing data, Whirlpool AU mobile frequencies wiki
# Last updated: 2026-05-22
# Purpose: Cross-reference observed EARFCNs against licensed operator bands
#          Any cell operating outside these ranges is anomalous

metadata:
  title: "Australian LTE Spectrum — ACMA Licensed Operator Bands"
  version: "1.0"
  source: "ACMA spectrum auctions, operator published band plans"
  jurisdiction: "Australia (MCC 505)"
  notes: >
    2G networks shut down in Australia as of 2018. Any GSM/GERAN redirect
    is therefore forensically significant — there is no legitimate 2G
    infrastructure to redirect to in Australia.

