  mechanism: >
    14% of mobile stations perform a Location Update Request to the real network
    using the CSS-assigned fake LAC as origin. This LAC leaks directly into
    Telstra's network logs and is observable by their monitoring infrastructure.
    Telstra, as a licensed Australian carrier, has access to exactly this data.
  regulatory_implication: >
    Telstra's written confirmation (Complaint Ref 128653446) of an unauthorised
    Cel-Fi G51 repeater provides external corroboration independent of capture data.
  source: "Dabrowski et al., RAID 2016 (A-ranked conference, T-Mobile Austria co-author)"

