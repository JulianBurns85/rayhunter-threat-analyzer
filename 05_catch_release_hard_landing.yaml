id: catch_release_hard_landing
name: "Catch and Release / Hard Landing"
category: identity_harvesting
severity: HIGH
subcategory: lte_registration_manipulation

description: >
  A named operational mode documented in the Harris Gemini 3.3 Quick Start Guide
  (ITAR, Section 4-2, Registration Preferences, LTE Method). Upon registration,
  RayFish rejects the registered mobile station (MS) and returns it to the real
  network. The MS re-registering with the legitimate network is termed the "Hard
  Landing." The rejected MS will not attempt to return to the RayFish device while
  registration remains active. The device obtains IMSI/IMEI/TMSI during the
  initial registration before the Attach Reject is issued.

  Re-registration options for the operator:
  - Stop and restart Registration mode manually
  - If Periodic mode is active, the MS auto-re-registers on the next uptime interval
  Single Shot recommended setting: 120-second uptime (Harris default)

attack_chain:
  - step: 1
    action: "CSS advertises priority cell (absolute_priority_cell_reselection)"
    protocol: LTE
    message: "SIBType1 / SIBType6 with modified cell reselection priority"
  - step: 2
    action: "UE executes cell reselection, attaches to CSS"
    protocol: LTE
    message: "RRCConnectionRequest → RRCConnectionSetup → RRCConnectionSetupComplete"
  - step: 3
    action: "CSS harvests IMSI/IMEI/TMSI during Attach procedure"
    protocol: LTE
    message: "AttachRequest (IMSI in plaintext on fresh attach)"
  - step: 4
    action: "CSS issues LTE Attach Reject, releasing UE back to real network"
    protocol: LTE
    message: "AttachReject (cause codes: #3, #6, #7, #8 per Tucker et al. Table III)"
  - step: 5
    action: "UE performs Hard Landing — re-registers with legitimate network"
    protocol: LTE
    message: "TAU Request or fresh Attach to real network"
  - step: 6
    action: "Operator-detectable artifact: UE sends LUR using fake LAC as origin (14% of devices)"
    protocol: LTE/GSM
    message: "Location Update Request with CSS-assigned LAC (Dabrowski RAID 2016)"

indicators:
  - type: rrc_cycle_t3
    description: "Metronomic RRCConnectionRelease cycle (T3 — idle/release period)"
    cranbourne_east_phase1: "3000.4s ±0.11–0.35s (Jan 13–22, 2026 — passive survey mode)"
    cranbourne_east_phase2_telstra: "210.212s ±0.139s, 333+ events (Jan 28–May 7, 2026)"
    cranbourne_east_phase2_vodafone: "40.553s ±0.327s, 27 intervals (Jan 28–May 7, 2026)"
    cranbourne_east_phase3: "Chaotic post-ACMA: 84s, 979s, 1253s (Vodafone); ~981s (Telstra)"
    harris_single_shot_default: 120  # seconds
    harris_periodic_downtime_default: 90  # seconds
    significance: HIGH
    verification: "tshark-verified from raw PCAPNG binary — NOT tool output"

  - type: rrc_hold_t1
    description: "Active connection hold duration (T1 — time device holds UE before releasing)"
    cranbourne_east_confirmed: "610.6s ±0.55s"
    sample_count: 5
    carriers_confirmed: ["Telstra 505-01", "Vodafone 505-03"]
    significance: CRITICAL
    note: >
      T1 = 610.6s is machine-precision (StdDev 0.55s) across five independent
      macro connection events spanning two days and two carriers. This parameter
      was UNCHANGED by the post-ACMA reconfiguration while T3 became chaotic.
      T1 consistency across both carriers confirms shared RayFish Controller
      configuration management. This is a confirmed Harris device signature.
    verification: "PCAPNG burst analysis — macro connection event timing"

  - type: rayfish_profile_cycling_artefact
    description: "Wrong-carrier period appearing briefly on a device — RayFish profile scroll"
    observed: >
      Telstra device briefly produced a 40.096s release cycle — matching
      Vodafone device's pre-ACMA T3 period (40.553s) — during the post-ACMA
      reconfiguration window (8 May 2026).
    mechanism: >
      Harris Gemini RayFish Controller stores named carrier configuration
      profiles. When an operator cycles through saved profiles while searching
      for a target configuration, the device applies each profile as it is
      selected. The appearance of the Vodafone period on the Telstra device
      is consistent with the operator scrolling through saved profiles on
      the controller while the device was live — briefly loading a profile
      configured for 40.5s before moving to another.
    significance: HIGH
    forensic_value: >
      Confirms active human operator interaction with the RayFish Controller
      during or immediately after the ACMA field visit. Not random noise —
      a specific artefact of profile-switching behaviour.

  - type: attach_reject
    description: "LTE Attach Reject immediately following fresh Attach"
    cause_codes: [3, 6, 7, 8]
    significance: HIGH
    source: "Tucker et al. 2023, Table III"

  - type: imsi_exposure
    description: "Plaintext IMSI in AttachRequest on fresh attach (no TMSI available)"
    protocol: LTE
    significance: CRITICAL
    note: "Confirmed in Cranbourne East QMDL captures — IMEISV also exposed"

  - type: ueinformation_request
    description: "UEInformationRequest-r9 following attach sequence"
    protocol: LTE
    significance: HIGH
    cranbourne_east_vodafone: "100% correlation after every release, 46× baseline rate"
    cranbourne_east_telstra: "Zero — Telstra device in logging mode only"
    note: >
      The Vodafone device's systematic UEInfo harvesting at 46× baseline with
      100% post-release correlation is consistent with targeted active collection.
      Division of labour between Telstra (logging) and Vodafone (active harvest)
      indicates deliberate dual-device configuration.

  - type: cross_carrier_sync
    description: "Simultaneous RRCConnectionRelease events on Telstra AND Vodafone"
    carriers: ["MCC=505/MNC=001 (Telstra)", "MCC=505/MNC=003 (Vodafone AU)"]
    significance: CRITICAL
    confirmed_events:
      - "April 8, 2026 15:38:08 UTC — 0-second gap"
      - "April 9, 2026 07:29 UTC — 1-second gap"
    note: >
      Cross-carrier simultaneous operation is architecturally disqualifying for
      srsRAN (single-carrier by design). Harris StingRay II / HailStorm supports
      4 Tx ports with separate Harpoon PAs enabling simultaneous multi-carrier
      impersonation. This is the PRIMARY discriminator for Harris hardware.

  - type: rogue_cell_ids
    description: "Confirmed rogue Cell IDs — all on-air as of 9 May 2026"
    telstra_505_01:
      persistent: [137713155, 137713195]
      new_pre_acma: [137713175]  # appeared 7 May 12:29 UTC, 19h before ACMA visit
      new_during_acma: [137713165]  # appeared 8 May 10:07 UTC, during ACMA visit
    vodafone_505_03:
