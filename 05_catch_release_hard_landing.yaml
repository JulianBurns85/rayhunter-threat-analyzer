      new: [8409367, 8409397]  # appeared 5 May 2026
    significance: CRITICAL
    note: >
      Addition of CID 137713175 approximately 19 hours before the ACMA field
      visit, and CID 137713165 during the visit, indicates the operator had
      advance awareness of regulatory contact and was actively expanding/
      reconfiguring the device pool in response.

