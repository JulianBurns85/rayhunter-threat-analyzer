# =============================================================================
# Rayhunter Threat Analyzer — Configuration
# =============================================================================
# v2.5 — INTEGRITY CORRECTION PASS (12 Jun 2026)
#   - known_rogue_cids EMPTIED. The previous list pre-classified legitimate
#     Telstra macro sectors as rogue, then fed them to the Shannon parser and
#     rogue-tower detector, which "confirmed" them by membership. That is
#     circular. CIDs are now in watchlist_cids (INFO-only) and must be
#     confirmed by per-capture BEHAVIOUR, not list membership.
#   - known_rogue_earfcns de-salted: standard Telstra band EARFCNs removed.
#   - MNC labelling corrected to 01 (Telstra). See note below.
#
# Provenance of the correction: 11 QMDL captures decoded via SCAT->GSMTAP->tshark
# (12 Jun 2026) showed, for every CID below: AES (EEA2/EIA2) security, no
# redirectedCarrierInfo, IMEISV (not IMSI) identity requests, accepted attaches,
# and that 137713155/165/175/195 are sectors 3/13/23/43 of ONE eNB (537942) =
# a normal macro, not a rotation cluster.
# =============================================================================

network:
  mcc: "505"           # Australia
  mnc: "001"           # Telstra AU. ALDI/Boost/Belong MVNOs ALSO ride PLMN 50501.
  mnc_telstra:  "001"
  mnc_vodafone: "003"
  country: "AU"
  # ---------------------------------------------------------------------------
  # MNC LABELLING BUG (finding [20] "MNC=03 (Vodafone AU)"):
  # The SIB1 PLMN for every captured cell decodes to MCC 505 / MNC 01 = Telstra.
  # If the Cell Summary still prints MNC=03/Vodafone, the bug is in the SIB1 PLMN
  # decoder or a TAC->carrier guess table (NOT in this config — mnc is 001 here).
  # Find it with:
  #   grep -rniE "vodafone|mnc.?=.?3|carrier_name|plmn_name|30336.*vodafone" .
  # The PLMN MNC must be read from the SIB1 plmn-Identity digits, never inferred
  # from TAC. TAC 30336 is a Telstra TAC here; TAC numbers are not carrier IDs.
  # ---------------------------------------------------------------------------

opencellid:
  enabled:    true
  api_key:    "REGENERATE_THIS_KEY"   # old key was pasted into a transcript — rotate it
  cache_days: 7
  # Lookups MUST use mnc=001. Querying mnc=003 returns "not found" for real
  # Telstra cells and manufactures false "unregistered/rogue" results.

intelligence:
  db_path: "intelligence/db"

detection:

  identity_harvest:
    window_seconds: 120
    max_requests:   2        # 3GPP TS 24.301 max 2 per attach procedure
    flag_imeisv:    true
    # NOTE: an IMEISV Identity Request is routine device/VoLTE bookkeeping.
    # Only an IMSI Identity Request *before* security activation is the catcher
    # signature. Detectors must check identity_type before scoring as harvest.

  cipher_downgrade:
    flag_eea0: true
    flag_eia0: true
    flag_a5_0: true

  rrc_periodicity:
    cycle_seconds:       210.2
    tolerance_seconds:   15.0
    min_observations:    3
    sd_threshold_ms:     200
    harris_t1_seconds:   610.6
    harris_t1_tolerance: 5.0

  rogue_tower:
    cross_carrier_gap_seconds: 1.0
    min_rogue_cid_events:      2
    # -------------------------------------------------------------------------
    # known_rogue_cids: CONFIRMED rogue cells ONLY (byte-level attack behaviour
    # proven in a capture). EMPTY until something earns a place here.
    # A CID earns confirmation by exhibiting, keyed to its ECI/PCI/EARFCN:
    #   - redirectedCarrierInfo (forced downgrade), OR
    #   - EEA0/EIA0 actually SELECTED in a SecurityModeCommand, OR
    #   - IMSI (not IMEISV) Identity Request before security, OR
    #   - NAS Authentication Reject / Attach Reject / TAU Reject.
    # List membership is NOT confirmation.
    # -------------------------------------------------------------------------
    known_rogue_cids: []

    # -------------------------------------------------------------------------
    # watchlist_cids: previously (wrongly) auto-confirmed. Cleared by the
    # 12 Jun 2026 QMDL behavioural test. Kept here as INFO-only leads so the
    # history is preserved. Detectors must treat a watchlist hit as an INFO
    # note ("seen before"), NEVER as severity >= MEDIUM on its own.
    # -------------------------------------------------------------------------
    watchlist_cids:
      # eNB 537942 (Telstra macro, TAC 12385) — sectors, NOT a rotation cluster
      - "137713155"   # sector 3
      - "137713165"   # sector 13
      - "137713175"   # sector 23
      - "137713195"   # sector 43
      # eNB 32849 (Telstra macro, TAC 30336) — sectors
      - "8409357"     # sector 13
      - "8409367"     # sector 23
      - "8409387"     # sector 43
      - "8409397"     # sector 53
      # neighbours observed in captures (Telstra)
      - "8666381"     # eNB 33853 sector 13
      - "21940490"    # eNB 85705 sector 10
      - "21940538"    # eNB 85705 sector 58

  earfcn_anomaly:
    flag_nonstandard: true
    # -------------------------------------------------------------------------
    # De-salted. The following are STANDARD LTE EARFCNs in real Telstra bands
    # and are NOT anomalous — listing them guaranteed false positives:
    #   450,550 = Band 1 (2100) | 1275,1406,1550 = Band 3 (1800)
    #   3148    = Band 7 (2600) | 9410          = Band 28 (700)
    # Only genuinely out-of-table EARFCNs belong here. 16384 retained PENDING
    # verification against 3GPP TS 36.101 Table 5.7.3-1.
    # -------------------------------------------------------------------------
    known_rogue_earfcns:
      - 16384   # VERIFY: confirm this is outside all band tables before citing

  paging_target:
    min_pages_to_analyse:   50
    critical_page_count:   150
    base_quantum_seconds:   10.880
    base_window_lo:          9.0
    base_window_hi:         13.0
    base_count_for_confirmed: 40
    sd_for_confirmed:        2.0
    top_n_targets:           8

  cid_rotation:
    min_cids_for_rotation:    3
    min_events_per_cid:       3
    rotation_window_seconds: 7200
    suffix_step_threshold:    50
    min_transitions:          4
    exclude_same_enb:        true   # NEW: same-eNB sectors are normal, never rotation

  proximity_track:
    spike_threshold_db:    15.0
    extreme_rsrp_dbm:     -85.0
    sustained_rsrp_dbm:   -95.0
    sustained_min_events:   3
    multi_cid_min:          2
    multi_cid_rsrp_dbm:  -100.0
    multi_cid_window_s:   120.0

  heuristic_scorer:
    imeisv_min_events:              2
    eea0_max_for_transparent_proxy: 0
    persistence_days_professional:  90
    persistence_days_harris:       300

reporting:
  severity_levels:     ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO"]
  min_severity:        "LOW"
  include_raw_events:  false
  timestamp_format:    "%Y-%m-%d %H:%M:%S UTC"

hardware_fingerprint:
  confidence_threshold:             0.3
  harris_t1_seconds:               610.6
  harris_t1_tolerance_seconds:       5.0
  harris_persistence_threshold_days: 300

bug_report_dir: "C:/RH/BugReports"
